<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analyst Ratings Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}

/* Header */
.header{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;padding:28px 36px 22px;}
.header h1{font-size:1.7rem;font-weight:700;letter-spacing:-.5px}
.header p{margin-top:6px;font-size:.82rem;opacity:.6}
.ticker-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 11px;font-size:.72rem;font-weight:600;letter-spacing:.4px;color:#e2e8f0}

/* Metrics */
.metrics{display:flex;gap:14px;padding:20px 36px;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 22px;flex:1;min-width:130px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card .lbl{font-size:.72rem;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:1.8rem;font-weight:700;line-height:1.1;margin-top:4px}
.card.up .val{color:#16a34a}.card.dn .val{color:#dc2626}.card.nu .val{color:#2563eb}

/* Tabs */
.tabs{display:flex;gap:4px;padding:0 36px;border-bottom:2px solid #e2e8f0;background:#fff}
.tab{padding:10px 22px;cursor:pointer;font-weight:600;font-size:.85rem;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab.active{color:#0f172a;border-bottom-color:#2563eb}

/* Controls */
.controls{display:flex;gap:10px;padding:16px 36px;background:#fff;flex-wrap:wrap;align-items:center;border-bottom:1px solid #e2e8f0}
.controls select,.controls input{
  border:1px solid #cbd5e1;border-radius:8px;padding:6px 12px;font-size:.82rem;color:#0f172a;background:#f8fafc;outline:none
}
.controls select:focus,.controls input:focus{border-color:#2563eb}
.count{margin-left:auto;font-size:.78rem;color:#94a3b8}

/* Table */
.tbl-wrap{padding:0 36px 36px;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:14px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
th{background:#f8fafc;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;padding:10px 14px;text-align:left;border-bottom:2px solid #e2e8f0}
td{padding:9px 14px;border-bottom:1px solid #f1f5f9;font-size:.82rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.upgrade td{background:#f0fdf4;color:#166534}
tr.downgrade td{background:#fef2f2;color:#991b1b}
tr.neutral td{background:#f8fafc;color:#1e293b}
tr:hover td{filter:brightness(.97)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:700}
.badge.up{background:#dcfce7;color:#16a34a}
.badge.dn{background:#fee2e2;color:#dc2626}
.badge.nu{background:#eff6ff;color:#2563eb}
a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}
.headline{max-width:480px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Export */
.export{margin:0 36px 0;display:flex;justify-content:flex-end}
.export a{font-size:.78rem;color:#64748b;border:1px solid #cbd5e1;border-radius:8px;padding:5px 14px;text-decoration:none}
.export a:hover{background:#f1f5f9}

@media(max-width:640px){
  .header,.metrics,.tabs,.controls,.tbl-wrap,.export{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 Avalon Dashboard</h1>
  <p>Last updated Apr 25, 2026 07:35 · 12 symbols tracked</p>
  <div class="ticker-row" id="ticker-pills"></div>
</div>

<div class="metrics">
  <div class="card"><div class="lbl">Total Ratings</div><div class="val" id="m-total">—</div></div>
  <div class="card up"><div class="lbl">⬆ Upgrades</div><div class="val" id="m-up">—</div></div>
  <div class="card dn"><div class="lbl">⬇ Downgrades</div><div class="val" id="m-dn">—</div></div>
  <div class="card nu"><div class="lbl">➡ Neutral</div><div class="val" id="m-nu">—</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('ratings',this)">📋 Analyst Ratings</div>
  <div class="tab" onclick="switchTab('news',this)">📰 News</div>
</div>

<!-- Ratings pane -->
<div id="pane-ratings">
  <div class="controls">
    <select id="r-ticker" onchange="renderRatings()"><option value="">All Symbols</option></select>
    <select id="r-type" onchange="renderRatings()">
      <option value="">All Types</option>
      <option>Upgrade</option><option>Downgrade</option><option>Neutral</option>
    </select>
    <input id="r-firm" placeholder="Filter by firm…" oninput="renderRatings()" style="width:180px"/>
    <span class="count" id="r-count"></span>
  </div>
  <div class="tbl-wrap">
    <table><thead><tr>
      <th>Date</th><th>Ticker</th><th>Firm</th><th>Action</th><th>Rating</th><th>Price Target</th><th>Type</th>
    </tr></thead><tbody id="r-body"></tbody></table>
  </div>
  <div class="export"><a id="r-export" href="#" download="ratings.csv">⬇️ Export CSV</a></div>
</div>

<!-- News pane -->
<div id="pane-news" style="display:none">
  <div class="controls">
    <select id="n-ticker" onchange="renderNews()"><option value="">All Symbols</option></select>
    <input id="n-search" placeholder="Search headlines…" oninput="renderNews()" style="width:220px"/>
    <span class="count" id="n-count"></span>
  </div>
  <div class="tbl-wrap">
    <table><thead><tr>
      <th>Date</th><th>Time</th><th>Ticker</th><th>Headline</th><th>Source</th>
    </tr></thead><tbody id="n-body"></tbody></table>
  </div>
  <div class="export"><a id="n-export" href="#" download="news.csv">⬇️ Export CSV</a></div>
</div>

const TICKERS = ["AIP", "AMSC", "AOSL", "ARM", "GEV", "MXL", "PBI", "POWI", "RMBS", "STM", "TTMI", "WLAC"];

// Populate ticker pills
const pillRow = document.getElementById('ticker-pills');
TICKERS.forEach(t => {
  const s = document.createElement('span');
  s.className = 'pill'; s.textContent = t;
  pillRow.appendChild(s);
});

// Populate ticker selects
['r-ticker','n-ticker'].forEach(id => {
  const sel = document.getElementById(id);
  TICKERS.forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o);
  });
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-ratings').style.display = name==='ratings'?'':'none';
  document.getElementById('pane-news').style.display    = name==='news'?'':'none';
}

function renderRatings(){
  const tk  = document.getElementById('r-ticker').value;
  const tp  = document.getElementById('r-type').value;
  const fm  = document.getElementById('r-firm').value.toLowerCase();
  let rows  = RATINGS.filter(r =>
    (!tk || r.ticker===tk) &&
    (!tp || r.type===tp) &&
    (!fm || r.firm.toLowerCase().includes(fm))
  );
  document.getElementById('r-count').textContent = rows.length + ' records';
  document.getElementById('m-total').textContent = rows.length;
  document.getElementById('m-up').textContent    = rows.filter(r=>r.type==='Upgrade').length;
  document.getElementById('m-dn').textContent    = rows.filter(r=>r.type==='Downgrade').length;
  document.getElementById('m-nu').textContent    = rows.filter(r=>r.type==='Neutral').length;

  const cls = {Upgrade:'upgrade',Downgrade:'downgrade',Neutral:'neutral'};
  const badge = {Upgrade:'up',Downgrade:'dn',Neutral:'nu'};
  document.getElementById('r-body').innerHTML = rows.map(r => `
    <tr class="${cls[r.type]||'neutral'}">
      <td>${esc(r.date)}</td>
      <td><strong>${esc(r.ticker)}</strong></td>
      <td>${esc(r.firm)}</td>
      <td>${esc(r.action)}</td>
      <td>${esc(r.rating)}</td>
      <td>${esc(r.pt)}</td>
      <td><span class="badge ${badge[r.type]||'nu'}">${esc(r.type)}</span></td>
    </tr>`).join('');

  // CSV export
  const csv = ['Date,Ticker,Firm,Action,Rating,Price Target,Type',
    ...rows.map(r=>[r.date,r.ticker,r.firm,r.action,r.rating,r.pt,r.type].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))
  ].join('\n');
  document.getElementById('r-export').href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
}

function renderNews(){
  const tk  = document.getElementById('n-ticker').value;
  const q   = document.getElementById('n-search').value.toLowerCase();
  let rows  = NEWS.filter(n =>
    (!tk || n.ticker===tk) &&
    (!q  || n.headline.toLowerCase().includes(q) || n.source.toLowerCase().includes(q))
  );
  document.getElementById('n-count').textContent = rows.length + ' articles';
  document.getElementById('n-body').innerHTML = rows.map(r => `
    <tr>
      <td>${esc(r.date)}</td>
      <td>${esc(r.time)}</td>
      <td><strong>${esc(r.ticker)}</strong></td>
      <td class="headline"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.headline)}</a></td>
      <td>${esc(r.source)}</td>
    </tr>`).join('');

  const csv = ['Date,Time,Ticker,Headline,Source,URL',
    ...rows.map(r=>[r.date,r.time,r.ticker,r.headline,r.source,r.url].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))
  ].join('\n');
  document.getElementById('n-export').href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
}

renderRatings();
renderNews();
</script>
